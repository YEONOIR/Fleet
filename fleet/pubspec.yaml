name: fleet
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  path_provider: ^2.1.2
  path: ^1.9.0
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  firebase_storage: ^13.2.0
  flutter:
    sdk: flutter

  flutter_map: ^8.2.2
  http: ^1.6.0
  image_picker: ^1.2.1
  latlong2: ^0.9.1
  simple_gradient_text: 1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/Logo.png
    - assets/icons/avatar.jpg
    # Vehicle images
    - assets/images/bike.jpg
    - assets/images/car.jpg
    - assets/images/car2.jpg
    - assets/images/car3.jpg
    - assets/images/car4.jpg
    # Bank logos
    - assets/images/bank_scb.jpg
    - assets/images/bank_bbl.png
    - assets/images/bank_kbank.jpg
    - assets/images/bank_gsb.jpg
    - assets/images/bank_ktb.png

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900
