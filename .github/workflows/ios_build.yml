name: iOS Build (Unsigned IPA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        # 💡 สั่งให้ทุกขั้นตอนเข้าไปทำในโฟลเดอร์ fleet โดยอัตโนมัติ
        working-directory: ./fleet 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS App (No Code Signing)
        run: flutter build ios --release --no-codesign

      - name: Package into .ipa
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -qq -r app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fleet-iOS-App
          # 💡 ตอนดึงไฟล์ออกมา ต้องระบุด้วยว่าไฟล์อยู่ในโฟลเดอร์ fleet
          path: fleet/app.ipa
